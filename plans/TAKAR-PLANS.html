<!DOCTYPE html>
<html lang="id" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TAKAR — Bursa Opini Terukur Indonesia</title>
<meta name="description" content="TAKAR — Platform Bursa Opini Terukur pertama Indonesia. Research & Architecture Plan.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300..700&family=JetBrains+Mono:wght@400;500&family=Instrument+Serif:ital@0;1&display=swap" rel="stylesheet">
<style>
:root,[data-theme="light"]{
  --color-bg:#f7f6f2;--color-surface:#f9f8f5;--color-surface-2:#fbfbf9;
  --color-surface-offset:#f3f0ec;--color-surface-dynamic:#e6e4df;
  --color-divider:#dcd9d5;--color-border:#d4d1ca;
  --color-text:#28251d;--color-text-muted:#7a7974;--color-text-faint:#bab9b4;
  --color-primary:#01696f;--color-primary-hover:#0c4e54;--color-primary-highlight:#cedcd8;
  --color-success:#437a22;--color-success-highlight:#d4dfcc;
  --color-blue:#006494;--color-blue-highlight:#c6d8e4;
  --color-gold:#d19900;--color-gold-highlight:#e9e0c6;
  --color-orange:#da7101;--color-orange-highlight:#e7d7c4;
  --color-error:#a12c7b;--color-error-highlight:#e0ced7;
  --color-purple:#7a39bb;--color-purple-highlight:#dacfde;
  --shadow-sm:0 1px 2px oklch(0.2 0.01 80/0.06);
  --shadow-md:0 4px 12px oklch(0.2 0.01 80/0.08);
  --shadow-lg:0 12px 32px oklch(0.2 0.01 80/0.12);
  --radius-sm:0.375rem;--radius-md:0.5rem;--radius-lg:0.75rem;--radius-xl:1rem;--radius-full:9999px;
  --transition:180ms cubic-bezier(0.16,1,0.3,1);
  --font-body:'Inter',sans-serif;--font-display:'Instrument Serif',Georgia,serif;--font-mono:'JetBrains Mono',monospace;
  --text-xs:clamp(0.75rem,0.7rem + 0.25vw,0.875rem);
  --text-sm:clamp(0.875rem,0.8rem + 0.35vw,1rem);
  --text-base:clamp(1rem,0.95rem + 0.25vw,1.125rem);
  --text-lg:clamp(1.125rem,1rem + 0.75vw,1.5rem);
  --text-xl:clamp(1.5rem,1.2rem + 1.25vw,2.25rem);
  --text-hero:clamp(2rem,0.5rem + 6vw,5rem);
  --space-1:.25rem;--space-2:.5rem;--space-3:.75rem;--space-4:1rem;--space-5:1.25rem;
  --space-6:1.5rem;--space-8:2rem;--space-10:2.5rem;--space-12:3rem;--space-16:4rem;--space-20:5rem;
}
[data-theme="dark"]{
  --color-bg:#0f0e0d;--color-surface:#161513;--color-surface-2:#1c1b19;
  --color-surface-offset:#1d1c1a;--color-divider:#262523;--color-border:#393836;
  --color-text:#cdccca;--color-text-muted:#797876;--color-text-faint:#5a5957;
  --color-primary:#4f98a3;--color-primary-hover:#227f8b;--color-primary-highlight:#1e3133;
  --color-success:#6daa45;--color-success-highlight:#1e2e18;
  --color-blue:#5591c7;--color-blue-highlight:#1a2a38;
  --color-gold:#e8af34;--color-gold-highlight:#2e2510;
  --color-orange:#fdab43;--color-orange-highlight:#2e2010;
  --color-error:#d163a7;--color-error-highlight:#2a1828;
  --color-purple:#a86fdf;--color-purple-highlight:#221630;
  --shadow-sm:0 1px 2px oklch(0 0 0/0.25);--shadow-md:0 4px 12px oklch(0 0 0/0.35);
  --shadow-lg:0 12px 32px oklch(0 0 0/0.5);
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{-webkit-font-smoothing:antialiased;scroll-behavior:smooth;scroll-padding-top:4.5rem}
body{min-height:100dvh;line-height:1.7;font-family:var(--font-body);font-size:var(--text-base);color:var(--color-text);background:var(--color-bg);overflow-x:hidden}
img,svg{display:block;max-width:100%}
h1,h2,h3,h4{text-wrap:balance;line-height:1.2}
p,li{text-wrap:pretty}
a,button{transition:color var(--transition),background var(--transition),border-color var(--transition),opacity var(--transition)}
:focus-visible{outline:2px solid var(--color-primary);outline-offset:3px;border-radius:var(--radius-sm)}

/* PROGRESS BAR */
#progress-bar{position:fixed;top:0;left:0;height:2px;background:var(--color-primary);width:0%;z-index:200;transition:width 0.1s linear}

/* TOPBAR */
.topbar{position:sticky;top:0;z-index:100;background:color-mix(in oklch,var(--color-bg) 88%,transparent);backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px);border-bottom:1px solid var(--color-border);padding:0 var(--space-4);height:52px;display:flex;align-items:center;justify-content:space-between;gap:var(--space-3)}
.topbar-brand{display:flex;align-items:center;gap:var(--space-2);text-decoration:none;color:var(--color-text);flex-shrink:0}
.topbar-title{font-family:var(--font-display);font-size:1.15rem;font-style:italic;letter-spacing:-0.02em}
.topbar-nav{display
